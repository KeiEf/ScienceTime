{% extends 'members/base.html' %}

{% block title %}アカウント削除 - ScienceTime{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle-fill"></i> アカウント削除の確認</h4>
            </div>
            <div class="card-body p-4 text-center">
                <p class="fs-5 fw-bold text-danger">本当にアカウントを削除しますか？</p>
                <p class="text-muted small">
                    アカウントを削除すると、これまでのプロフィール設定や通知データはすべて完全に消去され、元に戻すことはできません。<br>
                    （※あなたがこれまでに投稿したメッセージやスレッドはそのまま残ります）
                </p>
                
                <hr class="my-4">
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'members:profile_edit' %}" class="btn btn-outline-secondary px-4">
                            残す（キャンセル）
                        </a>
                        <button type="submit" class="btn btn-danger px-4">
                            完全に削除する
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

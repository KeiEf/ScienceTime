<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>メッセージの編集 - ScienceTime</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { background-color: white; padding: 30px; border-radius: 8px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .submit-btn { margin-top: 20px; padding: 10px 15px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .cancel-btn { margin-top: 20px; display: inline-block; margin-left: 10px; color: #555; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>メッセージの編集</h2>
        
        <form method="post" enctype="multipart/form-data"> {% csrf_token %}
            <p>
                {{ form.content }}
            </p>
            
            <p>
                <label style="font-size: 0.9em; color: #666;">画像の変更・追加（任意）</label><br>
                {{ form.image }}
            </p>

            <button type="submit" class="submit-btn">更新する</button>
            <a href="{% url 'members:thread_detail' message.thread.id %}" class="cancel-btn">キャンセル</a>
        </form>
    </div>

</body>
</html>

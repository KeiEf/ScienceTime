{% extends 'members/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white py-3">
                <h5 class="mb-0">プロフィールの編集</h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">ユーザー名</label>
                        <input type="text" name="username" class="form-control" value="{{ user.username }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">メールアドレス（不要）</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">自己紹介</label>
                        <textarea name="bio" class="form-control" rows="5" placeholder="関心や取り組みなど，自由に書いてください。">{{ profile.bio }}</textarea>
                        <div class="form-text text-muted small">最大500文字まで入力できます。</div>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" name="receive_notifications" value="True" class="form-check-input" id="notifCheck" 
                            {% if profile.receive_notifications %}checked{% endif %}>
                        <label class="form-check-label fw-bold" for="notifCheck">
                            新しい返信などの通知を受け取る
                        </label>
                    </div>


                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark">変更を保存する</button>
                        <a href="{% url 'members:user_profile' user.username %}" class="btn btn-outline-secondary">キャンセル</a>
                    </div>
                </form>

                <div class="mt-5 pt-4 border-top text-end">
                    <p class="text-muted small mb-1">掲示板の利用をやめる場合</p>
                    <a href="{% url 'members:delete_account' %}" class="text-danger small text-decoration-none">
                        <i class="bi bi-person-x"></i> アカウントを削除（退会）する
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}

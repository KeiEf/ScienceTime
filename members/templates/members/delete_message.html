<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>メッセージの削除確認 - ScienceTime</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { background-color: white; padding: 30px; border-radius: 8px; max-width: 500px; margin: 0 auto; text-align: center; }
        .message-box { background-color: #f9f9f9; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #ddd; text-align: left; }
        .delete-btn { padding: 10px 20px; background-color: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .cancel-btn { padding: 10px 20px; background-color: #ccc; color: black; text-decoration: none; border-radius: 5px; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: #e74c3c;">メッセージの削除</h2>
        <p>以下のメッセージを削除します。この操作は取り消せません。<br>本当によろしいですか？</p>

        <div class="message-box">
            {{ message.content }}
        </div>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="delete-btn">はい、削除します</button>
            <a href="{% url 'members:thread_detail' message.thread.id %}" class="cancel-btn">キャンセル</a>
        </form>
    </div>

</body>
</html>

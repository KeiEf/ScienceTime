{% extends "base.html" %}
{% load static %}

{% block additional_static %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
{% endblock %}


{% block content %}
{% include "posts/post_form.html" %}

<!-- Set default datetime in JavaScript as fallback -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Only set default if the field is empty
    const postDateField = document.getElementById('id_post_date');
    if (!postDateField.value) {
        const now = new Date();
        // Format as YYYY-MM-DDTHH:MM (datetime-local format)
        const formatted = now.toISOString().slice(0, 16);
        postDateField.value = formatted;
    }
});
</script>
{% endblock %}
